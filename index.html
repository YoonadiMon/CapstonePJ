<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AfterVolt | Let's Recycle</title>
    <link rel="icon" type="image/png" href="/main/assets/images/bolt-lightning-icon.svg">

    <link rel="stylesheet" href="/main/style/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--MainBlue) 0%, var(--DarkBlue) 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background decorations */
        .blob-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            filter: blur(80px);
            z-index: 0;
        }

        .blob-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            filter: blur(70px);
            z-index: 0;
        }

        .blob-3 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: 20%;
            left: 10%;
            filter: blur(60px);
            z-index: 0;
        }

        .blob-4 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            bottom: 30%;
            right: 15%;
            filter: blur(50px);
            z-index: 0;
        }

        .dots-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.2) 2px, transparent 2px);
            background-size: 40px 40px;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .wave-line {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(255, 255, 255, 0.02) 20px,
                rgba(255, 255, 255, 0.02) 40px
            );
            z-index: 0;
            pointer-events: none;
        }

        main {
            width: 100%;
            max-width: 1400px;
            height: 100vh;
            margin: 0 auto;
            padding: 1rem 2rem;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .landing-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            position: relative;
            z-index: 3;
        }

        .landing-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 3;
        }

        .image-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: auto;
            aspect-ratio: 1/1;
        }

        .slideshow-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slideshow-img.active {
            opacity: 1;
        }

        /* Glow effect around image */
        .landing-image::after {
            content: '';
            position: absolute;
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(30px);
            z-index: 1;
            pointer-events: none;
        }

        /* Image indicators */
        .image-indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator.active {
            background: white;
            transform: scale(1.2);
        }

        .landing-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
            width: 100%;
            position: relative;
            z-index: 3;
        }

        .landing-content h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.25rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .landing-content h2 {
            font-size: 2rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 1rem;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .hero-description {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            max-width: 450px;
            margin-bottom: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.3px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cta-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: fit-content;
        }

        .btn-primary {
            font-size: 1.1rem;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            background-color: var(--White);
            color: var(--MainBlue);
            display: inline-block;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.3);
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 3;
        }

        .btn-primary:hover {
            background-color: var(--LightBlue);
            transform: translateY(-3px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4);
        }

        .learn-more-link {
            font-size: 0.9rem;
            color: var(--White);
            text-decoration: none;
            border-bottom: 1px solid var(--White);
            padding-bottom: 2px;
            transition: all 0.2s ease;
            font-weight: 400;
            letter-spacing: 0.5px;
            opacity: 0.9;
            position: relative;
            z-index: 3;
        }

        .learn-more-link:hover {
            opacity: 1;
            border-bottom-width: 2px;
        }

        @media (min-width: 760px) {
            .landing-hero {
                flex-direction: row;
                gap: 3rem;
            }

            .landing-content h1 {
                font-size: 3.5rem;
            }

            .landing-content h2 {
                font-size: 2.5rem;
                margin-bottom: 1rem;
            }

            .hero-description {
                font-size: 1.1rem;
                margin-bottom: 2rem;
            }

            .btn-primary {
                font-size: 1.2rem;
                padding: 1rem 3rem;
            }

            .learn-more-link {
                font-size: 1rem;
            }
        }

        @media (min-width: 1150px) {
            .landing-content h1 {
                font-size: 4rem;
            }

            .landing-content h2 {
                font-size: 2.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background decorations -->
    <div class="dots-pattern"></div>
    <div class="wave-line"></div>
    <div class="blob-1"></div>
    <div class="blob-2"></div>
    <div class="blob-3"></div>
    <div class="blob-4"></div>

    <main>
        <section class="landing-hero">
            <!-- Left side - Auto slideshow images -->
            <div class="landing-image">
                <div class="image-container">
                    <img class="slideshow-img active" src="/main/assets/images/landing-hero-1.jpg" alt="E-waste recycling" onerror="this.src='https://via.placeholder.com/500x500?text=Recycle+1'">
                    <img class="slideshow-img" src="/main/assets/images/landing-hero-2.jpg" alt="Community recycling" onerror="this.src='https://via.placeholder.com/500x500?text=Recycle+2'">
                    <img class="slideshow-img" src="/main/assets/images/landing-hero-3.jpg" alt="Sustainable future" onerror="this.src='https://via.placeholder.com/500x500?text=Recycle+3'">
                    
                    <!-- Image indicators -->
                    <div class="image-indicators">
                        <span class="indicator active" onclick="currentSlide(0)"></span>
                        <span class="indicator" onclick="currentSlide(1)"></span>
                        <span class="indicator" onclick="currentSlide(2)"></span>
                    </div>
                </div>
            </div>
            
            <!-- Right side - Text -->
            <div class="landing-content">
                <h1>LET'S RECYCLE</h1>
                <h2>SAVE OUR PLANET</h2>
                
                <p class="hero-description">
                    Join our community in transforming e-waste into valuable resources. 
                    Together, we can build a cleaner, greener future for Malaysia.
                </p>
                
                <div class="cta-container">
                    <a href="signIn.html" class="btn-primary">GET STARTED</a>
                    <a href="learn-more.html" class="learn-more-link">LEARN MORE</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        let slideIndex = 0;
        const slides = document.querySelectorAll('.slideshow-img');
        const indicators = document.querySelectorAll('.indicator');
        let autoSlideInterval;

        function showSlide(index) {
            if (index >= slides.length) slideIndex = 0;
            if (index < 0) slideIndex = slides.length - 1;
            
            slides.forEach(slide => {
                slide.classList.remove('active');
            });
            
            indicators.forEach(indicator => {
                indicator.classList.remove('active');
            });
            
            slides[slideIndex].classList.add('active');
            if (indicators[slideIndex]) {
                indicators[slideIndex].classList.add('active');
            }
        }

        function nextSlide() {
            slideIndex++;
            showSlide(slideIndex);
        }

        function currentSlide(index) {
            slideIndex = index;
            showSlide(slideIndex);
            clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(nextSlide, 3000);
        }

        window.addEventListener('load', function() {
            autoSlideInterval = setInterval(nextSlide, 3000);
        });

        document.querySelectorAll('.indicator').forEach((indicator, index) => {
            indicator.addEventListener('click', () => {
                currentSlide(index);
            });
        });
    </script>

    <script src="/main/javascript/mainScript.js"></script>
</body>
</html>
