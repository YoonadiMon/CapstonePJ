<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign In - AfterVolt</title>
    <link rel="icon" type="image/png" href="main/assets/images/bolt-lightning-icon.svg">

    <link rel="stylesheet" href="main/style/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            margin: 1rem 2rem;
        }

        .c-logo-section {
            display: flex;
            align-items: center;
        }

        .c-logo-link {
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .c-logo {
            width: 1.5rem;
            height: auto;
        }

        .c-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .c-navbar-more {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .c-navbar-more button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .c-navbar-more button img {
            width: 1.4rem;
            height: auto;
        }

        /* Mobile dark mode button */
        .c-navbar-more-mobile {
            display: none;
        }

        @media (max-width: 759px) {
            .c-navbar-more {
                display: none !important;
            }
            .c-navbar-more-mobile {
                display: block;
            }
            
            .c-navbar-more-mobile button {
                background: none;
                border: none;
                cursor: pointer;
                padding: 0.5rem;
            }
            
            .c-navbar-more-mobile button img {
                width: 1.4rem;
                height: auto;
            }
        }

        hr {
            height: 1px;
            width: 90%;
            background-color: var(--Gray);
            margin: 0 auto;
            border: none;
        }

        /* Main content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .login-box {
            background-color: var(--sec-bg-color);
            padding: 2.5rem 2rem;
            border-radius: 25px;
            box-shadow: 0 8px 20px var(--shadow-color);
            width: 100%;
            position: relative;
            margin-top: 2rem;
        }

        .login-box::before {
            content: "Welcome to AfterVolt Portal!";
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 600;
            color: var(--MainBlue);
            white-space: nowrap;
        }

        .login-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .login-logo img {
            width: 3rem;
            height: auto;
        }

        .login-logo span {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .login-box h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 2rem;
            text-align: center;
        }

        .email-section {
            margin-bottom: 1.2rem;
        }

        .register-link {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        .register-link a {
            color: var(--MainBlue);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .email-input, .password-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--BlueGray);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }

        .email-input::placeholder, .password-input::placeholder {
            color: var(--Gray);
        }

        .email-input:focus, .password-input:focus {
            outline: none;
            border-color: var(--MainBlue);
        }

        .password-section {
            margin-bottom: 0.5rem;
        }

        .forgot-password {
            text-align: right;
            margin: 0.5rem 0 2rem;
        }

        .forgot-password a {
            color: var(--Gray);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-password a:hover {
            color: var(--MainBlue);
            text-decoration: underline;
        }

        .button-container {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .login-btn, .back-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
            text-align: center;
            text-decoration: none;
        }

        .login-btn {
            background-color: var(--MainBlue);
            color: white;
        }

        .login-btn:hover {
            background-color: var(--DarkerMainBlue);
        }

        .back-btn {
            background-color: transparent;
            color: var(--MainBlue);
            border: 2px solid var(--MainBlue);
        }

        .back-btn:hover {
            background-color: var(--LightBlue);
        }

        /* Footer */
        footer {
            background-color: var(--footer-color);
            padding: 2rem;
            text-align: center;
            margin-top: 1rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-info p {
            color: white;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .footer-copyright {
            color: white;
            font-size: 0.8rem;
            margin-top: 1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="cover" class="" onclick="hideMenu()"></div>
    
    <!-- Logo & Dark Mode Only -->
    <header>
        <!-- Logo + Name -->
        <section class="c-logo-section">
            <a href="index.html" class="c-logo-link">
                <img src="main/assets/images/logo.png" alt="Logo" class="c-logo">
                <div class="c-text">AfterVolt</div>
            </a>
        </section>

        <!-- Dark Mode Only (Desktop/Tablet) -->
        <section class="c-navbar-more">
            <button id="themeToggleDesktop">
                <img src="main/assets/images/light-mode-icon.svg" alt="Light Mode Icon">
            </button>
        </section>

        <!-- Dark Mode Only (Mobile) -->
        <section class="c-navbar-more-mobile">
            <button id="themeToggleMobile">
                <img src="main/assets/images/light-mode-icon.svg" alt="Light Mode Icon">
            </button>
        </section>
    </header>
    <hr>

    <!-- Main Content - Sign In Page -->
    <main>
        <div class="login-container">
            <div class="login-box">
                <div class="login-logo">
                    <img src="main/assets/images/logo.png" alt="AfterVolt Logo">
                    <span>AfterVolt</span>
                </div>

                <h2>Provider Sign In</h2>

                <!-- Email section with Register link -->
                <div class="email-section">
                    <div class="register-link">
                        <a href="main/html/Register.html">New here? Register Now</a>
                    </div>
                    <input type="email" class="email-input" placeholder="Email Address">
                </div>

                <!-- Password section -->
                <div class="password-section">
                    <input type="password" class="password-input" placeholder="Password">
                </div>

                <div class="forgot-password">
                    <a href="main/html/ForgotPassword.html">Forgot Password?</a>
                </div>

                <div class="button-container">
                    <a href="index.html" class="back-btn">BACK</a>
                    <a href="main/html/provider/pHome.html" class="login-btn">SIGN IN</a>
                </div>
            </div>
        </div>
    </main>

    <hr>
    
    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-info">
                <p>Promoting responsible e-waste collection and sustainable recycling practices in partnership with APU.</p>
                <p>+60 12 345 6789 | abc@gmail.com</p>
            </div>
            <div class="footer-copyright">
                <p>© 2026 AfterVolt. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggleDesktop = document.getElementById('themeToggleDesktop');
            const themeToggleMobile = document.getElementById('themeToggleMobile');
            
            function toggleTheme() {
                document.body.classList.toggle('dark-mode');
                const isDarkMode = document.body.classList.contains('dark-mode');
                const iconSrc = isDarkMode ? 
                    '/main/assets/images/dark-mode-icon.svg' : 
                    '/main/assets/images/light-mode-icon.svg';
                
                if (themeToggleDesktop) {
                    const img = themeToggleDesktop.querySelector('img');
                    if (img) img.src = iconSrc;
                }
                if (themeToggleMobile) {
                    const img = themeToggleMobile.querySelector('img');
                    if (img) img.src = iconSrc;
                }
            }
            
            if (themeToggleDesktop) {
                themeToggleDesktop.addEventListener('click', toggleTheme);
            }
            if (themeToggleMobile) {
                themeToggleMobile.addEventListener('click', toggleTheme);
            }
        });
    </script>

</body>
</html>
