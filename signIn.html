<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign In - AfterVolt</title>
    <link rel="icon" type="image/png" href="main/assets/images/bolt-lightning-icon.svg">

    <link rel="stylesheet" href="main/style/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            margin: 1rem 2rem;
        }

        .c-logo-section {
            display: flex;
            align-items: center;
        }

        .c-logo-link {
            text-decoration: none;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .c-logo {
            width: 1.5rem;
            height: auto;
        }

        .c-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-color);
        }

        .c-navbar-more {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .c-navbar-more button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .c-navbar-more button img {
            width: 1.4rem;
            height: auto;
        }

        /* Mobile dark mode button */
        .c-navbar-more-mobile {
            display: none;
        }

        @media (max-width: 759px) {
            .c-navbar-more {
                display: none !important;
            }
            .c-navbar-more-mobile {
                display: block;
            }
            
            .c-navbar-more-mobile button {
                background: none;
                border: none;
                cursor: pointer;
                padding: 0.5rem;
            }
            
            .c-navbar-more-mobile button img {
                width: 1.4rem;
                height: auto;
            }
        }

        hr {
            height: 1px;
            width: 90%;
            background-color: var(--Gray);
            margin: 0 auto;
            border: none;
        }

        /* Main content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }

        .login-box {
            background-color: var(--sec-bg-color);
            padding: 2.5rem 2rem;
            border-radius: 25px;
            box-shadow: 0 8px 20px var(--shadow-color);
            width: 100%;
            position: relative;
            margin-top: 2rem;
        }

        .login-box::before {
            content: "Welcome to AfterVolt Portal!";
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 600;
            color: var(--MainBlue);
            white-space: nowrap;
        }

        .login-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .login-logo img {
            width: 3rem;
            height: auto;
        }

        .login-logo span {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .login-box h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 2rem;
            text-align: center;
        }

        .email-section {
            margin-bottom: 1.2rem;
        }

        .email-input, .password-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--BlueGray);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .email-input::placeholder, .password-input::placeholder {
            color: var(--Gray);
        }

        .email-input:focus, .password-input:focus {
            outline: none;
            border-color: var(--MainBlue);
        }

        /* Error state for inputs */
        .input-error {
            border-color: #ff4444 !important;
            background-color: rgba(255, 68, 68, 0.05);
        }

        .password-section {
            margin-bottom: 1.5rem;
        }

        /* Error message */
        .error-message {
            color: #ff4444;
            font-size: 0.9rem;
            margin: 0.5rem 0 1.5rem;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .button-container {
            display: flex;
            gap: 1rem;
            width: 100%;
        }

        .login-btn, .back-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
            text-align: center;
            text-decoration: none;
        }

        .login-btn {
            background-color: var(--MainBlue);
            color: white;
        }

        .login-btn:hover {
            background-color: var(--DarkerMainBlue);
        }

        .back-btn {
            background-color: transparent;
            color: var(--MainBlue);
            border: 2px solid var(--MainBlue);
        }

        .back-btn:hover {
            background-color: var(--LightBlue);
        }

        /* Footer */
        footer {
            background-color: var(--footer-color);
            padding: 2rem;
            text-align: center;
            margin-top: 1rem;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-info p {
            color: white;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .footer-copyright {
            color: white;
            font-size: 0.8rem;
            margin-top: 1rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="cover" class="" onclick="hideMenu()"></div>
    
    <!-- Logo & Dark Mode Only -->
    <header>
        <!-- Logo + Name -->
        <section class="c-logo-section">
            <a href="index.html" class="c-logo-link">
                <img src="main/assets/images/logo.png" alt="Logo" class="c-logo">
                <div class="c-text">AfterVolt</div>
            </a>
        </section>

        <!-- Dark Mode Only (Desktop/Tablet) -->
        <section class="c-navbar-more">
            <button id="themeToggleDesktop">
                <img src="main/assets/images/light-mode-icon.svg" alt="Light Mode Icon">
            </button>
        </section>

        <!-- Dark Mode Only (Mobile) -->
        <section class="c-navbar-more-mobile">
            <button id="themeToggleMobile">
                <img src="main/assets/images/light-mode-icon.svg" alt="Light Mode Icon">
            </button>
        </section>
    </header>
    <hr>

    <!-- Main Content - Sign In Page -->
    <main>
        <div class="login-container">
            <div class="login-box">
                <div class="login-logo">
                    <img src="main/assets/images/logo.png" alt="AfterVolt Logo">
                    <span>AfterVolt</span>
                </div>

                <h2>Provider Sign In</h2>

                <!-- Email input only -->
                <div class="email-section">
                    <input type="email" class="email-input" id="email" placeholder="Email Address">
                </div>

                <!-- Password section (no hint) -->
                <div class="password-section">
                    <input type="password" class="password-input" id="password" placeholder="Password">
                </div>

                <!-- Error message display -->
                <div class="error-message" id="errorMessage"></div>

                <div class="button-container">
                    <a href="index.html" class="back-btn">BACK</a>
                    <button class="login-btn" id="signInBtn">
                        <span class="btn-text">SIGN IN</span>
                        <span class="loading-spinner" style="display: none;">⏳</span>
                    </button>

                </div>
            </div>
        </div>
    </main>

    <hr>
    
    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-info">
                <p>Promoting responsible e-waste collection and sustainable recycling practices in partnership with APU.</p>
                <p>+60 12 345 6789 | abc@gmail.com</p>
            </div>
            <div class="footer-copyright">
                <p>© 2026 AfterVolt. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggleDesktop = document.getElementById('themeToggleDesktop');
            const themeToggleMobile = document.getElementById('themeToggleMobile');
            
            function toggleTheme() {
                document.body.classList.toggle('dark-mode');
                const isDarkMode = document.body.classList.contains('dark-mode');
                const iconSrc = isDarkMode ? 
                    'main/assets/images/dark-mode-icon.svg' : 
                    'main/assets/images/light-mode-icon.svg';
                
                if (themeToggleDesktop) {
                    const img = themeToggleDesktop.querySelector('img');
                    if (img) img.src = iconSrc;
                }
                if (themeToggleMobile) {
                    const img = themeToggleMobile.querySelector('img');
                    if (img) img.src = iconSrc;
                }
            }
            
            if (themeToggleDesktop) {
                themeToggleDesktop.addEventListener('click', toggleTheme);
            }
            if (themeToggleMobile) {
                themeToggleMobile.addEventListener('click', toggleTheme);
            }

            // Sign In validation
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const signInBtn = document.getElementById('signInBtn');
            const errorMessage = document.getElementById('errorMessage');

            // Remove error class when user starts typing
            emailInput.addEventListener('input', function() {
                this.classList.remove('input-error');
                errorMessage.classList.remove('show');
            });
            
            passwordInput.addEventListener('input', function() {
                this.classList.remove('input-error');
                errorMessage.classList.remove('show');
            });

            // Sign In button click handler
            signInBtn.addEventListener('click', function(e) {
                e.preventDefault();
                
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                
                // Reset error states
                emailInput.classList.remove('input-error');
                passwordInput.classList.remove('input-error');
                errorMessage.classList.remove('show');
                
                // Validate email
                if (!email) {
                    showError('Please enter your email address', emailInput);
                    return;
                }
                
                // Validate email format
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    showError('Please enter a valid email address', emailInput);
                    return;
                }
                
                // Validate password
                if (!password) {
                    showError('Please enter your password', passwordInput);
                    return;
                }
                
                // Validate password requirements (without showing hints)
                if (password.length < 8) {
                    showError('Password must be at least 8 characters long', passwordInput);
                    return;
                }
                
                if (!/[a-z]/.test(password)) {
                    showError('Password must contain at least one lowercase letter', passwordInput);
                    return;
                }
                
                if (!/[A-Z]/.test(password)) {
                    showError('Password must contain at least one uppercase letter', passwordInput);
                    return;
                }
                
                if (!/[0-9]/.test(password)) {
                    showError('Password must contain at least one number', passwordInput);
                    return;
                }
                
                // If all validations pass, redirect to home page
                window.location.href = 'main/html/provider/pHome.html';
            });
            
            function showError(message, inputElement) {
                errorMessage.textContent = message;
                errorMessage.classList.add('show');
                inputElement.classList.add('input-error');
                
                // Scroll to error message
                errorMessage.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            
            document.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('signInBtn').click();
                }
            });
        });
    </script>

</body>
</html>
